<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Fairgrounds — Nantucket Island</title>
  <meta name="description" content="The Fairgrounds — Restaurant, Events & Community on Nantucket Island. 27 Fairgrounds Road.">
  <meta property="og:title" content="The Fairgrounds — Nantucket Island">
  <meta property="og:description" content="Restaurant, Events & Community. 27 Fairgrounds Road, Nantucket.">
  <meta property="og:image" content="https://www.nantucketfairgrounds.com/maplefest-2026.png">
  <meta property="og:url" content="https://www.nantucketfairgrounds.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    @font-face {
      font-family: 'BogueSlab';
      src: url('BogueSlab.otf') format('opentype');
      font-display: swap;
    }
    @font-face {
      font-family: 'ZebrawoodFill';
      src: url('ZebrawoodFill.otf') format('opentype');
      font-display: swap;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #efe1ab;
      --parchment: #f6edc8;
      --warm-white: #fff7e4;
      --olive: #4e5420;
      --olive-mid: #7a7e2e;
      --gold: #c79b34;
      --gold-light: #d4af5a;
      --orange: #d96a1f;
      --ink: #161616;
      --body: #3d3d3d;
      --muted: #6a6a6a;
    }

    body {
      font-family: 'BogusSlab', Georgia, 'Times New Roman', serif;
      background: var(--warm-white);
      color: var(--body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      width: 100%;
      max-width: 640px;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .logo-wrap img {
      width: 80px;
      height: auto;
      filter: drop-shadow(0 2px 8px rgba(78, 84, 32, 0.15));
    }
    .site-name {
      font-family: 'ZebrawoodFill', 'BogueSlab', serif;
      font-size: clamp(28px, 5vw, 38px);
      color: var(--olive);
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.1;
    }
    .site-sub {
      font-family: 'BogueSlab', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--olive-mid);
      text-align: center;
    }

    /* Flyer */
    .flyer-frame {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid var(--olive);
      box-shadow:
        0 4px 24px rgba(78, 84, 32, 0.12),
        0 1px 4px rgba(0,0,0,0.06);
      background: var(--parchment);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .flyer-frame:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 32px rgba(78, 84, 32, 0.18),
        0 2px 8px rgba(0,0,0,0.08);
    }
    .flyer-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Info bar */
    .info-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 16px;
      font-family: 'BogueSlab', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--olive-mid);
    }
    .info-bar .dot {
      color: var(--gold);
    }

    /* CTA */
    .cta-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 999px;
      font-family: 'BogueSlab', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.25s ease;
    }
    .btn-primary {
      background: var(--olive);
      color: var(--warm-white);
      border-color: var(--olive);
    }
    .btn-primary:hover {
      background: var(--olive-mid);
      border-color: var(--olive-mid);
      transform: translateY(-1px);
    }
    .btn-outline {
      background: transparent;
      color: var(--olive);
      border-color: var(--olive);
    }
    .btn-outline:hover {
      background: var(--olive);
      color: var(--warm-white);
      transform: translateY(-1px);
    }

    /* Footer */
    .footer {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }
    .footer a {
      color: var(--olive-mid);
      text-decoration: none;
    }
    .footer a:hover {
      color: var(--olive);
      text-decoration: underline;
    }

    /* Swash divider */
    .swash {
      width: 120px;
      height: 12px;
      opacity: 0.35;
    }

    @media (max-width: 480px) {
      .page { padding: 28px 16px 48px; gap: 24px; }
      .cta-row { flex-direction: column; width: 100%; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="logo-wrap">
      <img src="logo.png" alt="The Fairgrounds logo" width="80" height="95">
      <div class="site-name">The Fairgrounds</div>
      <div class="site-sub">Nantucket Island <span style="color:var(--gold);">&bull;</span> Restaurant <span style="color:var(--gold);">&bull;</span> Events <span style="color:var(--gold);">&bull;</span> Community</div>
    </div>

    <svg class="swash" viewBox="0 0 200 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 10 Q25 0 50 10 Q75 20 100 10 Q125 0 150 10 Q175 20 200 10" stroke="#4e5420" stroke-width="1.5" fill="none"/>
    </svg>

    <a href="maplefest-2026.png" target="_blank" rel="noopener" class="flyer-frame">
      <img
        src="maplefest-2026.png"
        alt="Maple Fest 2026 — Saturday, March 28th at The Fairgrounds, 27 Fairgrounds Road, Nantucket. Nanpuppets show, maple boil demo, face painting, balloon art, line dancing."
        width="2825"
        height="3575"
        loading="eager"
      >
    </a>

    <div class="info-bar">
      <span>27 Fairgrounds Road</span>
      <span class="dot">&bull;</span>
      <span>Nantucket, MA</span>
      <span class="dot">&bull;</span>
      <span>Saturday, March 28</span>
    </div>

    <div class="cta-row">
      <a href="https://jonathanprivat.github.io/the-faregrounds/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        View Menu
      </a>
      <a href="https://maps.google.com/?q=27+Fairgrounds+Road+Nantucket+MA" target="_blank" rel="noopener" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Get Directions
      </a>
    </div>

    <div class="footer">
      <a href="https://jonathanprivat.github.io/the-faregrounds/">thefairgrounds.com</a>
    </div>

  </div>

</body>
</html>
